{%- assign items = site.data.news | sort: 'date' | reverse -%}
<ol class="ox-timeline">
  {%- for item in items -%}
    {%- assign emoji = item.emoji | default: "🎉" -%}
    <li class="ox-timeline__item">
      <span class="ox-timeline__dot" aria-hidden="true"></span>
      <time class="ox-timeline__date" datetime="{{ item.date }}">{{ item.date | replace: '-', '.' }}</time>
      <div class="ox-timeline__text">{{ emoji }} {{ item.text }}</div>
    </li>
  {%- endfor -%}
</ol>
