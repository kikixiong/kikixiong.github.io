# Honors and Awards — structured for the .ox-honors card grid.
# Each entry:
#   date         : "YYYY.MM"  -> rendered as a gold uppercase chip
#   emoji        : leading badge emoji (🥇 🥈 🥉 🏅 🏆 etc.)
#   title        : main award name (rendered bold, Oxford Blue)
#   institution  : awarding body (rendered Inter italic, muted)
#   category     : "scholarship" | "competition" — drives section grouping
